---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.categories.size > 0 %}
        <span aria-hidden="true">/</span>
        {{ page.categories | join: ", " }}
      {% endif %}
    </p>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

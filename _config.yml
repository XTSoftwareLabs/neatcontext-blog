title: NeatContext Blog
description: Notes, updates, and technical writing from NeatContext.
url: "https://blog.neatcontext.com"
baseurl: ""
lang: en
timezone: Asia/Shanghai

permalink: /:categories/:year/:month/:day/:title/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
